name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Sentrux structural check
        run: |
          curl -fsSL https://github.com/sentrux/sentrux/releases/download/v0.5.7/sentrux-linux-x86_64 -o /tmp/sentrux
          chmod +x /tmp/sentrux
          /tmp/sentrux check .

      - run: npm run test:coverage

      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
